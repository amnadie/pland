<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Pland Catalog</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap"
    rel="stylesheet"
  />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f5f4f1;
      --card-bg: #b3b0a8;
      --card-hover: #a09e96;
      --text: #1a1a1a;
      --muted: #6b6b65;
      --border: #d5d2ca;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      min-height: 100vh;
    }

    .page-header {
      padding: 52px 60px 32px;
      border-bottom: 1px solid var(--border);
    }

    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      letter-spacing: 0.05em;
    }

    #status {
      padding: 40px 60px;
      color: #666;
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
    }

    #catalog {
      padding: 0 60px 80px;
    }

    .catalog-row {
      padding: 44px 0 48px;
      border-bottom: 1px solid var(--border);
    }

    .row-meta {
      display: flex;
      gap: 32px;
      margin-bottom: 20px;
      align-items: baseline;
    }

    .insta-handle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.2rem;
      border-bottom: 1px solid #000;
      padding-bottom: 2px;
    }

    .days-label {
      color: #777;
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
    }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .img-slot {
      position: relative;
      aspect-ratio: 3 / 4;
      background: var(--card-bg);
      overflow: hidden;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.2s;
    }

    .img-slot:hover {
      background: var(--card-hover);
    }

    .slot-label {
      color: white;
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      letter-spacing: 0.08em;
      line-height: 1.5;
      pointer-events: none;
    }

    .slot-preview {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .slot-preview.visible {
      display: block;
    }

    .slot-remove {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 24px;
      height: 24px;
      border: none;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      color: white;
      cursor: pointer;
      display: none;
      z-index: 5;
    }

    .slot-remove.visible {
      display: block;
    }

    .file-input {
      display: none;
    }

    .catalog-link-bar {
      margin-top: 16px;
      font-size: 0.92rem;
      color: #777;
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
    }

    .catalog-link-bar a {
      color: inherit;
    }

    .img-slot.drag-over {
      outline: 2px dashed rgba(255,255,255,0.8);
    }

    @media (max-width: 860px) {

      .page-header,
      #catalog {
        padding-left: 24px;
        padding-right: 24px;
      }

      .image-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

  </style>
</head>

<body>

  <header class="page-header">
    <span class="page-title">Pland</span>
  </header>

  <div id="status">Loading catalog...</div>

  <div id="catalog"></div>

  <script>

    // =========================================================
    // SUPABASE
    // =========================================================

    const SUPABASE_URL =
      "https://vcmzbsvrppdgrexjftpy.supabase.co";

    const SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInZjbXpic3ZycHBkZ3JleGpmdHB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjQyODksImV4cCI6MjA5NDk0MDI4OX0.QEa5KaxiCurmqPp7Ho33ot8CCLkesCG73zq39zJLwH8";

    const supabaseClient =
      supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY
      );

    // =========================================================
    // GOOGLE SHEET
    // =========================================================

    const CSV_URL =
      "https://docs.google.com/spreadsheets/d/e/" +
      "2PACX-1vRdy4wBfU53-IMJ6lXGSlJbCZ_wJStMGrSWLekwQ4kck-IbfBC_2fTFx4UetXCJIcQpfmCExSxe7t3g" +
      "/pub?output=csv";

    const IMAGES_PER_ROW = 4;

    // =========================================================
    // CSV PARSER
    // =========================================================

    function parseCSV(text) {

      const lines = text.trim().split("\n");

      const headers =
        splitCSVLine(lines[0]).map(h => h.trim());

      return lines.slice(1).map(line => {

        const values = splitCSVLine(line);

        const obj = {};

        headers.forEach((h, i) => {
          obj[h] = (values[i] || "").trim();
        });

        return obj;
      });
    }

    function splitCSVLine(line) {

      const result = [];

      let current = "";

      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {

        const ch = line[i];

        if (ch === '"') {

          inQuotes = !inQuotes;

        } else if (ch === "," && !inQuotes) {

          result.push(current);

          current = "";

        } else {

          current += ch;
        }
      }

      result.push(current);

      return result;
    }

    // =========================================================
    // FIND COLUMN
    // =========================================================

    function findCol(row, ...candidates) {

      for (const c of candidates) {

        for (const k of Object.keys(row)) {

          if (
            k.toLowerCase()
              .replace(/[áàâãä]/g, "a")
              .includes(
                c.toLowerCase()
                  .replace(/[áàâãä]/g, "a")
              )
          ) {
            return row[k];
          }
        }
      }

      return "";
    }

    // =========================================================
    // IMAGE COMPRESSION
    // =========================================================

    async function compressImage(file) {

      return new Promise(resolve => {

        const img = new Image();

        const reader = new FileReader();

        reader.onload = e => {
          img.src = e.target.result;
        };

        img.onload = () => {

          const canvas =
            document.createElement("canvas");

          const ctx =
            canvas.getContext("2d");

          const MAX_WIDTH = 1200;
          const MAX_HEIGHT = 1600;

          let width = img.width;
          let height = img.height;

          if (
            width > MAX_WIDTH ||
            height > MAX_HEIGHT
          ) {

            const ratio = Math.min(
              MAX_WIDTH / width,
              MAX_HEIGHT / height
            );

            width *= ratio;
            height *= ratio;
          }

          canvas.width = width;
          canvas.height = height;

          ctx.imageSmoothingEnabled = true;

          ctx.imageSmoothingQuality = "high";

          ctx.drawImage(
            img,
            0,
            0,
            width,
            height
          );

          canvas.toBlob(
            blob => resolve(blob),
            "image/jpeg",
            0.55
          );
        };

        reader.readAsDataURL(file);
      });
    }

    // =========================================================
    // UPLOAD IMAGE
    // =========================================================

    async function uploadImage(file, slotId) {

  const compressed =
    await compressImage(file);

  const fileName =
    `${slotId}-${Date.now()}.jpg`;

  const { error: uploadError } =
    await supabaseClient.storage
      .from("catalog-images")
      .upload(fileName, compressed, {
        upsert: true,
        contentType: "image/jpeg"
      });

  if (uploadError) {

    console.error("UPLOAD ERROR:", uploadError);

    alert(uploadError.message);

    return null;
  }

  const { data } =
    supabaseClient.storage
      .from("catalog-images")
      .getPublicUrl(fileName);

  const imageUrl =
    data.publicUrl;

  const { error: dbError } =
    await supabaseClient
      .from("catalog_images")
      .upsert({
        slot_id: slotId,
        image_url: imageUrl
      });

  if (dbError) {

    console.error("DB ERROR:", dbError);

    alert(dbError.message);

    return null;
  }

  return imageUrl;
}

    // =========================================================
    // GET IMAGE
    // =========================================================

    async function getSavedImage(slotId) {

      const { data } =
        await supabaseClient
          .from("catalog_images")
          .select("*")
          .eq("slot_id", slotId)
          .single();

      return data?.image_url || null;
    }

    // =========================================================
    // REMOVE IMAGE
    // =========================================================

    async function removeImage(slotId) {

      await supabaseClient
        .from("catalog_images")
        .delete()
        .eq("slot_id", slotId);
    }

    // =========================================================
    // BUILD ROW
    // =========================================================

    let rowCounter = 0;

    function buildRow(data) {

      rowCounter++;

      const rowId = `row-${rowCounter}`;

      const instagram =
        findCol(data, "instagram");

      const catalogUrl =
        findCol(
          data,
          "catalog",
          "link",
          "catálogo"
        );

      const row =
        document.createElement("div");

      row.className = "catalog-row";

      // META
      const meta =
        document.createElement("div");

      meta.className = "row-meta";

      const handle =
        document.createElement("span");

      handle.className = "insta-handle";

      handle.textContent =
        instagram || "—";

      meta.appendChild(handle);

      const days =
        document.createElement("span");

      days.className = "days-label";

      days.textContent = "days:";

      meta.appendChild(days);

      row.appendChild(meta);

      // GRID
      const grid =
        document.createElement("div");

      grid.className = "image-grid";

      for (let i = 1; i <= IMAGES_PER_ROW; i++) {

        const slotId =
          `${rowId}-slot-${i}`;

        const slot =
          document.createElement("div");

        slot.className = "img-slot";

        // LABEL
        const label =
          document.createElement("div");

        label.className = "slot-label";

        label.innerHTML =
          `CATALOG<br>IMAGE<br>#${i}`;

        slot.appendChild(label);

        // PREVIEW
        const preview =
          document.createElement("img");

        preview.className = "slot-preview";

        slot.appendChild(preview);

        // REMOVE
        const removeBtn =
          document.createElement("button");

        removeBtn.className =
          "slot-remove";

        removeBtn.innerHTML = "×";

        removeBtn.addEventListener(
          "click",
          async e => {

            e.stopPropagation();

            preview.src = "";

            preview.classList.remove(
              "visible"
            );

            removeBtn.classList.remove(
              "visible"
            );

            label.style.display = "";

            await removeImage(slotId);
          }
        );

        slot.appendChild(removeBtn);

        // RESTORE SAVED IMAGE
        getSavedImage(slotId)
          .then(saved => {

            if (!saved) return;

            preview.src = saved;

            preview.classList.add(
              "visible"
            );

            removeBtn.classList.add(
              "visible"
            );

            label.style.display = "none";
          });

        // INPUT
        const input =
          document.createElement("input");

        input.type = "file";

        input.accept = "image/*";

        input.className = "file-input";

        input.addEventListener(
          "change",
          async () => {

            const file =
              input.files[0];

            if (!file) return;

            slot.style.opacity = "0.5";

            const url =
              await uploadImage(
                file,
                slotId
              );

            slot.style.opacity = "1";

            if (!url) return;

            preview.src = url;

            preview.classList.add(
              "visible"
            );

            removeBtn.classList.add(
              "visible"
            );

            label.style.display = "none";

            input.value = "";
          }
        );

        slot.appendChild(input);

        // CLICK
        slot.addEventListener(
          "click",
          () => input.click()
        );

        // DRAG OVER
        slot.addEventListener(
          "dragover",
          e => {

            e.preventDefault();

            slot.classList.add(
              "drag-over"
            );
          }
        );

        // DRAG LEAVE
        slot.addEventListener(
          "dragleave",
          () => {

            slot.classList.remove(
              "drag-over"
            );
          }
        );

        // DROP
        slot.addEventListener(
          "drop",
          async e => {

            e.preventDefault();

            slot.classList.remove(
              "drag-over"
            );

            const file =
              e.dataTransfer.files[0];

            if (
              !file ||
              !file.type.startsWith(
                "image/"
              )
            ) return;

            slot.style.opacity = "0.5";

            const url =
              await uploadImage(
                file,
                slotId
              );

            slot.style.opacity = "1";

            if (!url) return;

            preview.src = url;

            preview.classList.add(
              "visible"
            );

            removeBtn.classList.add(
              "visible"
            );

            label.style.display = "none";
          }
        );

        grid.appendChild(slot);
      }

      row.appendChild(grid);

      // LINK
      const linkBar =
        document.createElement("div");

      linkBar.className =
        "catalog-link-bar";

      if (catalogUrl) {

        linkBar.innerHTML =
          `catalog link:
          <a href="${catalogUrl}"
          target="_blank">
          ${catalogUrl}
          </a>`;

      } else {

        linkBar.textContent =
          "catalog link: —";
      }

      row.appendChild(linkBar);

      return row;
    }

    // =========================================================
    // INIT
    // =========================================================

    async function init() {

      const statusEl =
        document.getElementById("status");

      const catalogEl =
        document.getElementById("catalog");

      try {

        const res =
          await fetch(CSV_URL);

        const text =
          await res.text();

        const rows =
          parseCSV(text).filter(r => {
            return Object.values(r)
              .some(v => v.trim() !== "");
          });

        statusEl.style.display = "none";

        rows.forEach(r => {

          catalogEl.appendChild(
            buildRow(r)
          );
        });

      } catch (err) {

        console.error(err);

        statusEl.textContent =
          "Failed to load sheet.";
      }
    }

    init();

  </script>

</body>
</html>
